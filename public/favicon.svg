<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115">
  <!-- Shield -->
  <path d="M50,2 L95,20 L95,68 Q95,98 50,113 Q5,98 5,68 L5,20 Z" fill="#7C3AED"/>
  <path d="M50,10 L87,26 L87,68 Q87,92 50,105 Q13,92 13,68 L13,26 Z" fill="#6D28D9" opacity="0.4"/>

  <!-- Scale crossbar -->
  <rect x="37" y="36" width="26" height="4" rx="2" fill="#fff"/>
  <!-- Scale pole -->
  <rect x="48" y="39" width="4" height="30" rx="2" fill="#fff"/>
  <!-- Left arm string -->
  <line x1="38" y1="39" x2="28" y2="54" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Right arm string -->
  <line x1="62" y1="39" x2="72" y2="54" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Left pan -->
  <ellipse cx="27" cy="56" rx="10" ry="3.5" fill="none" stroke="#fff" stroke-width="2.5"/>
  <!-- Right pan -->
  <ellipse cx="73" cy="56" rx="10" ry="3.5" fill="none" stroke="#fff" stroke-width="2.5"/>
  <!-- Base foot -->
  <rect x="44" y="68" width="12" height="3.5" rx="1.75" fill="#fff"/>

  <!-- "S" lettermark at bottom of shield -->
  <text x="50" y="95" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#E9D5FF" letter-spacing="1">ST</text>
</svg>
